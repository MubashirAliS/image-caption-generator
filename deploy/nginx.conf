server {
    listen 80;
    server_name _;

    # Serve frontend build
    root /var/www/caption-app/frontend/dist;
    index index.html;

    # Increase body size to allow image uploads (5MB app limit)
    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to FastAPI (running on localhost:8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    # Optional: serve static assets by file
    location /assets/ {
        try_files $uri =404;
    }

    # Recommended security headers (minimal)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";
}
